<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUUNO - Conéctate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-layout">

    <!-- LADO IZQUIERDO -->
    <div class="auth-left">
        <div class="auth-glow"></div>
        <h1 class="auth-brand">YUUNO</h1>
        <p class="auth-tagline">
            Connect, share and discover your vibe in a new modern social experience.
        </p>
    </div>

    <!-- LADO DERECHO -->
    <div class="auth-right">

        <!-- FORMULARIO DE LOGIN -->
        <div class="auth-form-card" id="loginCard">
            <h2>Bienvenido de nuevo</h2>
            
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                <button type="submit">Iniciar sesión</button>
            </form>

            <p>¿No tienes cuenta? 
                <a href="#" id="goToRegister">Crear cuenta</a>
            </p>
        </div>

        <!-- FORMULARIO DE REGISTRO -->
        <div class="auth-form-card" id="registerCard" style="display:none;">
            <h2>Crear cuenta</h2>
            
            <form id="registerForm">
                <input type="text" id="registerUsername" placeholder="Nombre de usuario" required>
                <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
                <input type="password" id="registerPassword" placeholder="Contraseña" required>
                <button type="submit">Registrarse</button>
            </form>

            <p>¿Ya tienes cuenta? 
                <a href="#" id="goToLogin">Iniciar sesión</a>
            </p>
        </div>

    </div>
</div>

<script src="script.js"></script>

<script>
// Alternar entre Login y Registro
document.getElementById('goToRegister').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('registerCard').style.display = 'block';
});

document.getElementById('goToLogin').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('registerCard').style.display = 'none';
    document.getElementById('loginCard').style.display = 'block';
});
</script>

</body>
</html>
