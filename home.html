<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUUNO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">YUUNO</div>

        <nav class="menu">
            <a class="active">🏠 Inicio</a>
            <a>🔍 Explorar</a>
            <a>💬 Mensajes</a>
            <a>🔔 Notificaciones</a>
            <a>🔖 Guardados</a>
            <a>👤 Perfil</a>
        </nav>

        <button class="create-btn">+ Crear publicación</button>
    </aside>

    <!-- FEED CENTRAL -->
    <main class="feed-container">

        <!-- STORIES -->
        <div class="stories">
            <div class="story add">+</div>
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
        </div>

        <!-- CREATE POST -->
        <div class="create-post">
            <input id="postInput" placeholder="¿Qué estás pensando?" />
            <button onclick="crearPost()">Publicar</button>
        </div>

        <!-- FEED -->
        <div id="feed" class="feed"></div>

    </main>

    <!-- PANEL DERECHO -->
    <aside class="right-panel">
        <div class="card">
            <h3>Tendencias</h3>
            <p>#YUUNO</p>
            <p>#FindYourVibe</p>
            <p>#GamingLife</p>
            <p>#MusicVibes</p>
        </div>

        <div class="card">
            <h3>A quién seguir</h3>
            <p>Sofia</p>
            <p>Maxz</p>
            <p>Luisito</p>
        </div>
    </aside>

</div>

<script src="script.js"></script>

<script>
const token = localStorage.getItem("yuunoToken");
if (!token) window.location.href = "login.html";
</script>
<button id="logoutBtn">
    Cerrar sesión
</button>
</body>
</html>
