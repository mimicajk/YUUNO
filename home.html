<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>YUUNO - Home</title>

  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-logo">YUUNO</div>
        <div class="navbar-links">
            <a href="#" class="active">🏠 Inicio</a>
            <a href="#">💬 Chat</a>
            <a href="#"> Perfil</a>
        </div>
        <div class="user-info">
            <span id="usernameDisplay"></span>
           <button id="logoutBtn" class="btn-logout">Cerrar sesión</button>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="home-content">
        
        <!-- CREAR POST -->
        <div class="create-post">
            <div class="post-avatar" id="userAvatar">U</div>
            <input type="text" id="postInput" placeholder="¿Qué estás pensando?">
            <button onclick="crearPost()" class="btn-post">Publicar</button>
        </div>

        <!-- FEED -->
        <div class="feed" id="feed">
            <!-- Los posts se cargarán aquí -->
        </div>

    </div>

<script src="script.js"></script>
<script>
    const session = localStorage.getItem("yuunoSession");

    if (!session) {
        window.location.href = "login.html";
    }
</script>


 <!-- MOSTRAR NOMBRE DEL USUARIO -->
    <script>
        const user = JSON.parse(localStorage.getItem("yuunoUser"));
        const usernameDisplay = document.getElementById("usernameDisplay");

        if (user && usernameDisplay) {
            usernameDisplay.textContent = user.username;
        }
    </script>

    <script>
    const logoutBtn = document.getElementById("logoutBtn");

    if (logoutBtn) {
        logoutBtn.addEventListener("click", function () {

            // Eliminar sesión
            localStorage.removeItem("yuunoSession");

            // Redirigir al login
            window.location.href = "login.html";
        });
    }
</script>

</body>
</html>
